<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Links oficiais da GoodBox — kits onboarding e brindes corporativos."
    />
    <title>GoodBox · Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/svg+xml" href="logo-mark.svg" />
  </head>
  <body>
    <div class="atmosphere" aria-hidden="true"></div>

    <main class="page">
      <header class="profile">
        <img
          class="logo"
          id="logo"
          src="logo-branco.svg"
          alt="GoodBox"
          width="240"
          height="47"
        />
        <h1 class="brand visually-hidden" id="brand">GoodBox</h1>
      </header>

      <nav class="links" id="links" aria-label="Links principais"></nav>

      <footer class="footer">
        <div class="socials" id="socials" aria-label="Redes sociais"></div>
        <p class="credit" id="credit"></p>
      </footer>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
