<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Links oficiais da Goodbox — tudo que você precisa em um só lugar."
    />
    <title>Goodbox · Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />

  <body>
    <div class="atmosphere" aria-hidden="true">
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>
      <div class="grain"></div>
    </div>

    <main class="page">
      <header class="profile">
        <div class="avatar" id="avatar" aria-hidden="true">GB</div>
        <h1 class="brand" id="brand">Goodbox</h1>
        <p class="tagline" id="tagline">
          Seus atalhos essenciais, reunidos em um só lugar.
        </p>

      <nav class="links" id="links" aria-label="Links principais"></nav>

      <footer class="footer">
        <div class="socials" id="socials" aria-label="Redes sociais"></div>
        <p class="credit" id="credit"></p>
      </footer>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
